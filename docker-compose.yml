services:
  cache:
    image: redis:7.4@sha256:3e0669e42d4fe421c9dea0ba5fbc04d336b80b4f32a6c7d25bee3a1d089288a1
    container_name: redis
    ports:
      - '6379:6379'
    command: >
      --requirepass ${CACHE_PASSWORD}

  app:
    image: pfl-connecting-services
    container_name: pfl-connecting-services
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./assets:/app/assets
      - ./esbuild:/app/esbuild
      - ./integration-tests:/app/integration-tests
      - ./server:/app/server
      - ./test-assets:/app/test-assets
      - ./.env:/app/.env
      - ./.env.test:/app/.env.test
      - ./.prettierrc.json:/app/.prettierrc.json
      - ./cypress.config.ts:/app/cypress.config.ts
      - ./eslint.config.mjs:/app/eslint.config.mjs
      - ./jest.config.mjs:/app/jest.config.mjs
      - ./nodemon.json:/app/nodemon.json
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./reporter-config.json:/app/reporter-config.json
      - ./tsconfig.json:/app/tsconfig.json
    ports:
      - "8001:8001"
    profiles:
      - dev
