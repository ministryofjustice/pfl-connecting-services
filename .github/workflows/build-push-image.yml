name: 'Build & Push Image'

on:
  workflow_call:
    outputs:
      registry:
        description: 'AWS registry where the ECR is located'
        value: ${{ jobs.image_build.outputs.registry }}

jobs:
  image_build:
    name: 'Build'
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: 'Configure AWS credentials'
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: 'Log into ECR'
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64
        id: ecr-login

      - name: 'Build & Push to ECR'
        run: |

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

          docker image build -t $REGISTRY/$REPOSITORY:node-$IMAGE_TAG .
          docker image push $REGISTRY/$REPOSITORY:node-$IMAGE_TAG

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
