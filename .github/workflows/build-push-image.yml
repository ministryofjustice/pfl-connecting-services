name: 'Build & Push Image'

on:
  workflow_call:
    outputs:
      registry:
        description: 'AWS registry where the ECR is located'
        value: ${{ jobs.image_build.outputs.registry }}

jobs:
  image_build:
    name: 'Build'
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: 'Configure AWS credentials'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: 'Log into ECR'
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419
        id: ecr-login

      - name: 'Build & Push to ECR'
        run: |

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

          docker image build -t $REGISTRY/$REPOSITORY:node-$IMAGE_TAG .
          docker image push $REGISTRY/$REPOSITORY:node-$IMAGE_TAG

          # ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░  ░░

        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
