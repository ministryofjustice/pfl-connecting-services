apiVersion: v1
kind: ConfigMap
metadata:
  name: ${KUBE_NAMESPACE}-config
  namespace: ${KUBE_NAMESPACE}
data:
  NODE_ENV: 'production'
  USE_HTTPS: 'true'
  STATIC_RESOURCE_CACHE_DURATION: '1h'
  WEB_SESSION_TIMEOUT_IN_MINUTES: '30'
  CACHE_ENABLED: 'true'
  CACHE_TLS_ENABLED: 'true'
  INCLUDE_WELSH_LANGUAGE: 'false'
  USE_AUTH: 'true'
  CONTACT_EMAIL: 'childarrangements@justice.gov.uk'
  FEEDBACK_URL: 'https://www.gov.uk/done/find-ways-to-make-child-arrangements'
  PREVIEW_END: '2026-03-31T23:59:59'
  SERVICE_URL: 'https://connecting-services-staging.apps.live.cloud-platform.service.justice.gov.uk/'